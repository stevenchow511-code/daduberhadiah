<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roll Dadu Keuntungan</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    text-align:center;
}

.container {
    max-width:400px;
    margin:auto;
    padding:20px;
}

.banner {
    background: linear-gradient(90deg,#facc15,#f97316);
    padding:15px;
    border-radius:12px;
    font-weight:bold;
    color:black;
    margin-bottom:20px;
}

input {
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    margin-bottom:10px;
    text-align:center;
}

.dice-wrap{
    display:flex;
    justify-content:center;
    gap:20px;
}

.dice {
    font-size:70px;
    margin:20px 0;
    transition: transform 0.2s;
}

.dice.rolling {
    animation: shake 0.3s infinite;
}

@keyframes shake {
    0% { transform: rotate(0deg); }
    25% { transform: rotate(10deg); }
    50% { transform: rotate(-10deg); }
    75% { transform: rotate(8deg); }
    100% { transform: rotate(0deg); }
}

button {
    width:100%;
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.result {
    margin-top:20px;
    font-size:24px;
    font-weight:bold;
    min-height:30px;
}

/* ANIMASI HADIAH */
.result.show {
    animation: pop 0.4s ease, glow 1s ease infinite alternate;
}

@keyframes pop {
    0% {transform: scale(0.5); opacity:0;}
    100% {transform: scale(1); opacity:1;}
}

@keyframes glow {
    from {text-shadow:0 0 5px #22c55e;}
    to {text-shadow:0 0 20px #22c55e, 0 0 30px #22c55e;}
}

.popup {
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#22c55e;
    padding:10px 15px;
    border-radius:10px;
    display:none;
    z-index:9999;
}
</style>
</head>

<body>

<div class="container">

<div class="banner">🎲 ROLL DADU & MENANGKAN HADIAH 🎁</div>

<h2>ROLL 2 DADU</h2>

<input type="text" id="kode" placeholder="Masukkan kode" />

<div class="dice-wrap">
    <div class="dice" id="dice1">🎲</div>
    <div class="dice" id="dice2">🎲</div>
</div>

<button onclick="rollDice()">ROLL SEKARANG</button>

<div class="result" id="result"></div>

</div>

<div class="popup" id="popup"></div>

<script>
// SOUND EFFECT
const rollSound = new Audio("https://www.soundjay.com/misc/sounds/dice-roll-1.mp3");
const winSound = new Audio("https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3");
let hadiahGlobal = "";
const kodeValid = "SPIN123";

function animateText(element, text) {
    element.innerHTML = "";
    let i = 0;
    let typing = setInterval(()=>{
        element.innerHTML += text.charAt(i);
        i++;
        if(i >= text.length) clearInterval(typing);
    }, 30);
}

function rollDice() {
    rollSound.currentTime = 0;
    rollSound.play();
    const kode = document.getElementById("kode").value;
    if(kode !== kodeValid){
        alert("Kode salah!");
        return;
    }

    const dice1 = document.getElementById("dice1");
    const dice2 = document.getElementById("dice2");
    dice1.classList.add("rolling");
    dice2.classList.add("rolling");
    const dice2 = document.getElementById("dice2");
    const result = document.getElementById("result");

    result.classList.remove("show");
    result.innerHTML = "";

    let count = 0;

    let anim = setInterval(()=>{
        dice1.innerHTML = Math.floor(Math.random()*6)+1;
        dice2.innerHTML = Math.floor(Math.random()*6)+1;
        count++;

        if(count > 10){
            // DRAMA STOP (melambat)
            if(count < 15) return;
            clearInterval(anim);

            let d1 = Math.floor(Math.random()*6)+1;
            let d2 = Math.floor(Math.random()*6)+1;
            let total = d1 + d2;

            dice1.innerHTML = d1;
            dice2.innerHTML = d2;

            dice1.classList.remove("rolling");
            dice2.classList.remove("rolling");

            winSound.play();

            if(total <= 4) hadiahGlobal = "💸 5 RB";
            else if(total <= 7) hadiahGlobal = "💰 10 RB";
            else if(total <= 10) hadiahGlobal = "🎁 FREE SPIN";
            else if(total == 11) hadiahGlobal = "⚡ SCATTER";
            else hadiahGlobal = "🔥 20 RB";

            let text = "Total: "+total+" → " + hadiahGlobal;

            setTimeout(()=>{
                result.classList.add("show");
                animateText(result, text);
            }, 300);
        }
    },100);
}

// popup fake
const names = ["Andi","Budi","Siti","Rina"];
const rewards = ["20 RB","10 RB","SCATTER"];

function showPopup(){
    const popup = document.getElementById("popup");
    let name = names[Math.floor(Math.random()*names.length)];
    let reward = rewards[Math.floor(Math.random()*rewards.length)];

    popup.innerHTML = "🎉 "+name+" menang "+reward;
    popup.style.display = "block";

    setTimeout(()=>{
        popup.style.display = "none";
    },3000);
}

showPopup();
setInterval(showPopup,5000);
</script>

</body>
</html>
